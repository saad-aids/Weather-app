<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - By Saad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class ="search">
            <input type ="text" placeholder="Enter city name" spellcheck="false">
            <button><img src ="images/search.png" alt="Search"></button>
        </div>
        <div class="error" style="display:none; color:#fff; margin-top:10px;">Invalid city name</div>
        <div class ="weather">
            <img src="images/rain.png" class="weather-icon">
            <h1 class="temp">22°C</h1>
            <h2 class="city">Pune</h2>
            <div class="details">
                <div class="col">
                    <img src="images/humidity.png" alt="Humidity">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind.png" alt="Wind">
                    <div>
                        <p class="wind">15 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    
    
    </div>

<script>

const apiKey = ""; // Enter your OpenWeatherMap API key
const apiUrl= "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

const searchBox = document.querySelector(".search input");
const searchButton = document.querySelector(".search button");
const weatherIcon = document.querySelector(".weather-icon");


async function checkWeather(city) {
    const errEl = document.querySelector(".error");
    if (!city || !city.trim()) {
        document.querySelector(".weather").style.display = "none";
        if (errEl) {
            errEl.innerText = "Please enter a city name.";
            errEl.style.display = "block";
        }
        return;
    }

    if (errEl) {
        errEl.innerText = "";
        errEl.style.display = "none";
    }

    const response = await fetch(apiUrl + city + '&appid=' + apiKey);
    console.log('Response status:', response.status);

    if (!response.ok) {
        console.error('API error', response.status);
        document.querySelector(".weather").style.display = "none";
        if (errEl) {
            errEl.innerText = "Invalid city name.";
            errEl.style.display = "block";
        }
        return;
    }

    const data = await response.json();
    console.log('Response data:', data);

    document.querySelector(".weather").style.display = "block";
    if (errEl) errEl.style.display = "none";

    document.querySelector(".city").innerHTML = data.name;
    document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + "°C";
    document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
    document.querySelector(".wind").innerHTML = data.wind.speed + " km/h";

    if(data.weather[0].main == "Clouds"){
        weatherIcon.src = "images/clouds.png";
    }
    else if(data.weather[0].main == "Clear"){
        weatherIcon.src = "images/clear.png";
    }
    else if(data.weather[0].main == "Rain"){
        weatherIcon.src = "images/rain.png";
    }
    else if(data.weather[0].main == "Drizzle"){
        weatherIcon.src = "images/drizzle.png";
    }
    else if(data.weather[0].main == "Mist"){
        weatherIcon.src = "images/mist.png";
    }

    document.querySelector(".weather").style.display = "block";
}

searchButton.addEventListener("click",()=>{
    checkWeather(searchBox.value);
});

// No automatic city lookup at start; user enters city first.
// checkWeather("Bangalore");
</script>
</body>
</html>
